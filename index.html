<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指数相关性矩阵</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: 'SF Pro Display', -apple-system, sans-serif; min-height: 100vh; }
  
  .header { padding: 32px 40px 0; border-bottom: 1px solid #21262d; padding-bottom: 24px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; color: #f0f6fc; }
  .header p { font-size: 13px; color: #7d8590; margin-top: 4px; }
  
  .controls { display: flex; gap: 16px; padding: 20px 40px; align-items: center; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
  .ctrl-group label { font-size: 11px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  .ctrl-group input[type=date], .ctrl-group select {
    background: #161b22; border: 1px solid #30363d; color: #e6edf3;
    padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none;
    cursor: pointer;
  }
  .ctrl-group input[type=date]:focus, .ctrl-group select:focus { border-color: #388bfd; }
  
  .btn { padding: 7px 16px; background: #238636; color: #fff; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer; align-self: flex-end; }
  .btn:hover { background: #2ea043; }

  .main { display: flex; gap: 0; padding: 0 40px 40px; flex-wrap: wrap; }
  
  .matrix-section { flex: 1; min-width: 500px; }
  .matrix-title { font-size: 13px; color: #7d8590; margin-bottom: 12px; margin-top: 24px; font-weight: 500; }
  
  .matrix-wrap { overflow-x: auto; }
  table { border-collapse: collapse; font-size: 12px; width: 100%; }
  th { padding: 8px 6px; color: #7d8590; font-weight: 500; font-size: 11px; white-space: nowrap; }
  th.row-header { text-align: right; color: #e6edf3; font-weight: 500; padding-right: 10px; }
  td { padding: 0; position: relative; }
  .cell { 
    width: 70px; height: 52px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    transition: opacity 0.15s; border: 1px solid transparent;
    border-radius: 4px; margin: 1px;
  }
  .cell:hover { border-color: rgba(255,255,255,0.3); opacity: 0.85; }
  .cell .val { font-size: 13px; font-weight: 600; }
  .cell .lbl { font-size: 9px; opacity: 0.6; margin-top: 1px; }
  .cell.diagonal { background: #21262d !important; }
  .cell.diagonal .val { color: #7d8590; }

  .detail { flex: 0 0 320px; padding-left: 32px; padding-top: 24px; }
  .detail-box { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 20px; margin-top: 24px; }
  .detail-title { font-size: 13px; font-weight: 600; color: #f0f6fc; margin-bottom: 12px; }
  .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #21262d; font-size: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: #7d8590; }
  .detail-val { font-weight: 600; }

  .legend { display: flex; gap: 6px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #7d8590; }
  .legend-swatch { width: 14px; height: 14px; border-radius: 2px; }
  
  .note { font-size: 11px; color: #7d8590; margin-top: 20px; padding: 12px; background: #161b22; border-radius: 6px; border-left: 3px solid #30363d; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 风格指数滚动相关性矩阵</h1>
  <p>基于日收益率滚动计算 · 数据来源：同花顺iFinD · 2021-06-24 至 2026-06-24</p>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>开始日期</label>
    <input type="date" id="startDate" value="2021-06-25" min="2021-06-25" max="2026-06-24">
  </div>
  <div class="ctrl-group">
    <label>结束日期</label>
    <input type="date" id="endDate" value="2026-06-24" min="2021-06-25" max="2026-06-24">
  </div>
  <div class="ctrl-group">
    <label>滚动窗口</label>
    <select id="window">
      <option value="20">20日（约1个月）</option>
      <option value="60" selected>60日（约3个月）</option>
      <option value="120">120日（约半年）</option>
      <option value="0">全区间</option>
    </select>
  </div>
  <button class="btn" onclick="update()">更新</button>
</div>

<div class="main">
  <div class="matrix-section">
    <div class="matrix-title" id="matrixTitle">相关性矩阵（全区间均值）</div>
    <div class="matrix-wrap">
      <table id="corrTable"></table>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#1a4a2e"></div> 低相关 (&lt;0.3)</div>

      <div class="legend-item"><div class="legend-swatch" style="background:#2ea043"></div> 较高 (0.6~0.8)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#56d364"></div> 高相关 (&gt;0.8)</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#3d2121"></div> 负相关</div>
    </div>
    <div class="note" id="dataNote"></div>
  </div>
  <div class="detail">
    <div class="detail-box" id="detailBox">
      <div class="detail-title">点击矩阵查看详情</div>
      <p style="font-size:12px;color:#7d8590">点击任意单元格查看两个指数的相关性统计</p>
    </div>
  </div>
</div>

const COLS = RAW.columns;
const DATES = RAW.dates;
const RETS = RAW.returns;

function getColor(v) {
  if (v === null || isNaN(v)) return '#21262d';
  if (v >= 0.8) return '#56d364';
  if (v >= 0.6) return '#2ea043';
  if (v >= 0.3) return '#1f6b3a';
  if (v >= 0)   return '#1a4a2e';
  if (v >= -0.3) return '#3d2121';
  return '#6b1f1f';
}

function getTextColor(v) {
  if (v === null || isNaN(v)) return '#7d8590';
  if (Math.abs(v) > 0.5) return '#f0f6fc';
  return '#e6edf3';
}

function filterByDate(start, end) {
  const si = DATES.findIndex(d => d >= start);
  let ei = DATES.length - 1;
  for (let i = DATES.length-1; i >= 0; i--) {
    if (DATES[i] <= end) { ei = i; break; }
  }
  return RETS.slice(si < 0 ? 0 : si, ei + 1);
}

function calcCorr(rows, ci, cj) {
  const pairs = rows.filter(r => r[ci] !== null && r[cj] !== null && !isNaN(r[ci]) && !isNaN(r[cj]));
  if (pairs.length < 5) return null;
  const ax = pairs.map(r => r[ci]);
  const ay = pairs.map(r => r[cj]);
  const n = ax.length;
  const mx = ax.reduce((a,b)=>a+b,0)/n;
  const my = ay.reduce((a,b)=>a+b,0)/n;
  const num = ax.reduce((s,x,i)=>s+(x-mx)*(ay[i]-my),0);
  const dx = Math.sqrt(ax.reduce((s,x)=>s+(x-mx)**2,0));
  const dy = Math.sqrt(ay.reduce((s,y)=>s+(y-my)**2,0));
  return (dx*dy < 1e-10) ? null : num/(dx*dy);
}

function buildMatrix(rows) {
  const n = COLS.length;
  const mat = [];
  for (let i=0;i<n;i++) {
    mat.push([]);
    for (let j=0;j<n;j++) {
      mat[i].push(i===j ? 1.0 : calcCorr(rows,i,j));
    }
  }
  return mat;
}

function renderTable(mat) {
  const t = document.getElementById('corrTable');
  const n = COLS.length;
  let h = '<thead><tr><th></th>';
  COLS.forEach(c => h += `<th>${c}</th>`);
  h += '</tr></thead><tbody>';
  mat.forEach((row,i) => {
    h += `<tr><th class="row-header">${COLS[i]}</th>`;
    row.forEach((v,j) => {
      const diag = i===j ? ' diagonal' : '';
      const vs = v===null ? 'N/A' : v.toFixed(2);
      const bg = i===j ? '' : `background:${getColor(v)}`;
      const tc = `color:${getTextColor(v)}`;
      h += `<td><div class="cell${diag}" style="${bg};${tc}" onclick="showDetail(${i},${j})">
        <span class="val">${vs}</span>
      </div></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody>';
  t.innerHTML = h;
}

let currentRows = RETS;
let currentMat = null;

function update() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  const win = parseInt(document.getElementById('window').value);
  
  currentRows = filterByDate(start, end);
  
  let matRows = currentRows;
  let titleSuffix = '全区间均值';
  if (win > 0 && currentRows.length > win) {
    matRows = currentRows.slice(-win);
    titleSuffix = `最近${win}日`;
  }
  
  currentMat = buildMatrix(matRows);
  renderTable(currentMat);
  
  document.getElementById('matrixTitle').textContent = `相关性矩阵（${start} 至 ${end} · ${titleSuffix}）`;
  document.getElementById('dataNote').textContent = `当前区间共 ${currentRows.length} 个交易日。道琼斯数据暂缺（iFinD未能导出），请补充后重新导入。费城半导体仅含A股交易日数据，与A股指数同步计算。`;
}

function showDetail(i, j) {
  if (i === j) return;
  const v = currentMat[i][j];
  const vs = v === null ? 'N/A' : v.toFixed(4);
  const abs = v === null ? '' : Math.abs(v) > 0.6 ? '强' : Math.abs(v) > 0.3 ? '中' : '弱';
  const dir = v === null ? '' : v > 0 ? '正' : '负';
  
  // 各自统计
  const ri = currentRows.filter(r => r[i] !== null && !isNaN(r[i])).map(r => r[i]);
  const rj = currentRows.filter(r => r[j] !== null && !isNaN(r[j])).map(r => r[j]);
  const ann = r => {
    const m = r.reduce((a,b)=>a+b,0)/r.length;
    const s = Math.sqrt(r.reduce((a,b)=>a+(b-m)**2,0)/r.length);
    return (s * Math.sqrt(252) * 100).toFixed(1) + '%';
  };
  
  document.getElementById('detailBox').innerHTML = `
    <div class="detail-title">${COLS[i]} × ${COLS[j]}</div>
    <div class="detail-row"><span class="detail-label">相关系数</span><span class="detail-val" style="color:${getColor(v)}">${vs}</span></div>
    <div class="detail-row"><span class="detail-label">相关强度</span><span class="detail-val">${abs}${dir}相关</span></div>
    <div class="detail-row"><span class="detail-label">${COLS[i]} 年化波动率</span><span class="detail-val">${ann(ri)}</span></div>
    <div class="detail-row"><span class="detail-label">${COLS[j]} 年化波动率</span><span class="detail-val">${ann(rj)}</span></div>
    <div class="detail-row"><span class="detail-label">有效样本</span><span class="detail-val">${currentRows.filter(r=>r[i]!==null&&r[j]!==null).length} 日</span></div>
  `;
}

update();
